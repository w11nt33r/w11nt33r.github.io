<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Patrimonio: El Salón</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
    :root {
        --bg:      #050914;
        --glass:   rgba(255,255,255,0.05);
        --glass-b: rgba(255,255,255,0.10);
        --text:    #f1f5f9;
        --muted:   rgba(241,245,249,0.50);
        --primary: #818cf8;
        --good:    #4ade80;
        --decent:  #60a5fa;
        --risky:   #fbbf24;
        --bad:     #f87171;
        --r:       16px;
        --r-sm:    10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
        font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
        background: var(--bg); color: var(--text);
        min-height: 100vh; overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    .bg { position:fixed; inset:0; z-index:0; overflow:hidden;
          background:linear-gradient(135deg,#050914 0%,#0a0e21 100%); }
    .orb { position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none;
           animation:orbFloat 22s ease-in-out infinite; }
    .o1 { width:520px; height:520px; background:rgba(129,140,248,.13); top:-180px; left:-100px; }
    .o2 { width:420px; height:420px; background:rgba(96,165,250,.10);  bottom:-120px; right:-80px; animation-delay:-8s; }
    .o3 { width:320px; height:320px; background:rgba(74,222,128,.07);  top:40%; left:35%; animation-delay:-14s; }
    .o4 { width:250px; height:250px; background:rgba(251,191,36,.06);  top:10%; right:20%; animation-delay:-19s; }
    @keyframes orbFloat {
        0%,100%{transform:translate(0,0) scale(1);}
        33%    {transform:translate(35px,-35px) scale(1.07);}
        66%    {transform:translate(-25px,22px) scale(.94);}
    }

    /* ── CONFETTI CANVAS ── */
    #fx { position:fixed; inset:0; pointer-events:none; z-index:9999; display:none; }

    /* ── LAYOUT ── */
    .page {
        position:relative; z-index:1;
        max-width:900px; margin:0 auto;
        padding:20px 20px 80px;
        display:flex; flex-direction:column; gap:14px;
    }
    .glass {
        background:var(--glass);
        backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
        border:1px solid var(--glass-b); border-radius:var(--r);
    }

    /* ── HEADER ── */
    .header { padding:18px 24px; display:flex; flex-direction:column; gap:14px; }
    .brand  { display:flex; align-items:center; gap:10px; }
    .brand-icon { font-size:28px; animation:iconBounce 3s ease-in-out infinite; }
    @keyframes iconBounce {
        0%,100%{transform:rotate(0deg) scale(1);}
        25%    {transform:rotate(-8deg) scale(1.1);}
        75%    {transform:rotate(8deg) scale(1.1);}
    }
    .brand-title {
        font-size:20px; font-weight:900; letter-spacing:-.5px;
        background:linear-gradient(90deg,#a5b4fc,#60a5fa,#818cf8);
        -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .brand-sub {
        margin-left:auto; font-size:12px; font-weight:600; color:var(--muted);
        border:1px solid var(--glass-b); padding:3px 12px; border-radius:99px;
    }
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .stat-pill {
        background:rgba(255,255,255,.04); border:1px solid var(--glass-b);
        border-radius:var(--r-sm); padding:10px 12px; text-align:center; transition:box-shadow .3s;
    }
    .stat-pill.patrimony { border-color:rgba(74,222,128,.35); background:rgba(74,222,128,.06); }
    @keyframes statFlash {
        0%  {box-shadow:0 0 22px rgba(129,140,248,.6);}
        100%{box-shadow:none;}
    }
    .stat-pill.flash { animation:statFlash .7s ease-out; }
    .stat-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
    .stat-val   { font-size:20px; font-weight:800; margin-top:2px; }
    .stat-val.neg { color:var(--bad); }

    /* delta float */
    .delta-float {
        position:fixed; pointer-events:none; z-index:9998;
        font-family:'Poppins',sans-serif; font-weight:900; font-size:15px;
        transform:translateX(-50%); animation:floatUp .9s cubic-bezier(.2,1,.4,1) forwards;
    }
    @keyframes floatUp {
        0%  {opacity:1; transform:translateX(-50%) translateY(0);}
        100%{opacity:0; transform:translateX(-50%) translateY(-52px);}
    }

    /* ── PROGRESS ── */
    .progress-section { display:flex; flex-direction:column; gap:8px; }
    .progress-meta { display:flex; justify-content:space-between; font-size:12px; font-weight:600; color:var(--muted); }
    .dots-row { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; }
    .dot {
        width:32px; height:32px; border-radius:50%;
        display:flex; align-items:center; justify-content:center;
        font-size:12px; font-weight:700; border:2px solid rgba(255,255,255,.12);
        color:var(--muted); transition:all .35s cubic-bezier(.34,1.56,.64,1); flex-shrink:0;
    }
    .dot.done    { background:rgba(74,222,128,.18); border-color:rgba(74,222,128,.55); color:var(--good); font-size:14px; }
    .dot.current { background:rgba(129,140,248,.25); border-color:var(--primary); color:white;
                   transform:scale(1.18); animation:dotPulse 2.2s ease-in-out infinite; }
    @keyframes dotPulse {
        0%,100%{box-shadow:0 0 14px rgba(129,140,248,.45);}
        50%    {box-shadow:0 0 28px rgba(129,140,248,.80);}
    }
    .bar-track { height:5px; background:rgba(255,255,255,.07); border-radius:99px; overflow:hidden; }
    .bar-fill  { height:100%; border-radius:99px;
                 background:linear-gradient(90deg,var(--primary),var(--decent));
                 transition:width .7s cubic-bezier(.4,0,.2,1);
                 box-shadow:0 0 10px rgba(129,140,248,.55); }

    /* ── GAME CONTAINER transitions ── */
    #game-container { padding:28px; }
    #game-container.exit  { opacity:0; transform:translateX(-28px);
                            transition:opacity .24s ease,transform .24s ease; }
    #game-container.enter { animation:slideIn .38s cubic-bezier(.34,1.1,.64,1) forwards; }
    @keyframes slideIn {
        from{opacity:0; transform:translateX(28px);}
        to  {opacity:1; transform:translateX(0);}
    }

    /* ── QUESTION SCREEN ── */
    .theory-box {
        background:rgba(96,165,250,.07); border:1px solid rgba(96,165,250,.18);
        border-left:3px solid var(--decent); border-radius:0 var(--r-sm) var(--r-sm) 0;
        padding:18px 20px; margin-bottom:18px; animation:fadeUp .4s ease both;
    }
    .theory-box h3 { font-size:14px; font-weight:700; color:var(--decent); margin-bottom:10px; }
    .theory-box p  { font-size:14px; line-height:1.75; color:rgba(241,245,249,.82); }
    .scenario-box {
        background:rgba(251,191,36,.07); border:1px solid rgba(251,191,36,.22);
        border-radius:var(--r-sm); padding:18px 20px; margin-bottom:22px;
        font-size:16px; font-weight:600; line-height:1.55;
        animation:fadeUp .4s .06s ease both;
    }
    .scenario-label { display:block; font-size:11px; font-weight:700; text-transform:uppercase;
                      letter-spacing:1.5px; color:var(--risky); margin-bottom:8px; }
    @keyframes fadeUp {
        from{opacity:0; transform:translateY(12px);}
        to  {opacity:1; transform:translateY(0);}
    }
    .options-label { font-size:11px; font-weight:700; text-transform:uppercase;
                     letter-spacing:1.5px; color:var(--muted); margin-bottom:10px; }
    .options-grid  { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .option-btn {
        background:rgba(255,255,255,.04); border:1.5px solid rgba(255,255,255,.09);
        border-radius:var(--r-sm); padding:18px 16px; font-family:inherit;
        font-size:14.5px; color:var(--text); cursor:pointer; text-align:left;
        display:flex; gap:12px; align-items:flex-start; line-height:1.55; will-change:transform;
        transition:background .2s,border-color .2s,box-shadow .2s;
        animation:optionIn .45s cubic-bezier(.34,1.4,.64,1) both;
    }
    .option-btn:nth-child(1){animation-delay:.10s;}
    .option-btn:nth-child(2){animation-delay:.20s;}
    .option-btn:nth-child(3){animation-delay:.30s;}
    .option-btn:nth-child(4){animation-delay:.40s;}
    @keyframes optionIn {
        from{opacity:0; transform:translateY(18px) scale(.96);}
        to  {opacity:1; transform:translateY(0) scale(1);}
    }
    .option-btn:not(:disabled):hover { background:rgba(255,255,255,.08);
        border-color:rgba(255,255,255,.20); box-shadow:0 8px 32px rgba(0,0,0,.35); }
    .option-btn:disabled { cursor:default; }
    .option-btn.dimmed   { opacity:.28; filter:grayscale(.5); }
    .option-btn.pulse-good { animation:pulseGood .65s cubic-bezier(.34,1.6,.64,1); }
    .option-btn.shake      { animation:shake .55s ease; }
    @keyframes pulseGood {
        0%,100%{transform:scale(1);} 45%{transform:scale(1.05);}
    }
    @keyframes shake {
        0%,100%{transform:translateX(0);}
        15%,45%,75%{transform:translateX(-9px);}
        30%,60%,90%{transform:translateX(9px);}
    }
    .badge {
        min-width:28px; height:28px; border-radius:8px;
        background:rgba(255,255,255,.11);
        display:flex; align-items:center; justify-content:center;
        font-size:13px; font-weight:800; flex-shrink:0; margin-top:1px;
        transition:background .3s,color .3s;
    }

    /* ── NEXT / VER RESULTADO BUTTON ── */
    .btn-next {
        display:none; margin-top:18px; width:100%;
        background:linear-gradient(135deg,#818cf8 0%,#60a5fa 100%);
        color:white; border:none; padding:16px 24px; border-radius:var(--r-sm);
        font-family:inherit; font-size:16px; font-weight:700; cursor:pointer;
        box-shadow:0 8px 26px rgba(129,140,248,.40);
        transition:transform .15s,box-shadow .15s;
        animation:btnIn .4s cubic-bezier(.34,1.5,.64,1) forwards;
    }
    @keyframes btnIn {
        from{opacity:0; transform:translateY(12px);}
        to  {opacity:1; transform:translateY(0);}
    }
    .btn-next:hover  { transform:translateY(-3px); box-shadow:0 14px 36px rgba(129,140,248,.55); }
    .btn-next:active { transform:translateY(0); }

    /* chips */
    .chips-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .chip { font-size:12px; font-weight:700; padding:4px 10px; border-radius:99px;
            background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.10); }

    /* ════════════════════════════════════
       RESULT SCREEN
    ════════════════════════════════════ */
    .result-screen { display:flex; flex-direction:column; gap:16px; }

    /* Quality hero card */
    .rs-hero {
        border-radius:var(--r); padding:36px 28px; text-align:center;
        border:1px solid transparent; position:relative; overflow:hidden;
        animation:heroDrop .6s cubic-bezier(.34,1.4,.64,1) both;
    }
    .rs-hero::after {
        content:''; position:absolute; inset:0; pointer-events:none;
        background:radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.08) 0%, transparent 70%);
    }
    @keyframes heroDrop {
        from{opacity:0; transform:translateY(-28px) scale(.88);}
        to  {opacity:1; transform:translateY(0) scale(1);}
    }

    .rs-hero-icon {
        font-size:72px; display:block; margin-bottom:16px;
        animation:iconPop .7s cubic-bezier(.34,2,.64,1) .15s both;
        filter:drop-shadow(0 0 24px currentColor);
    }
    @keyframes iconPop {
        from{opacity:0; transform:scale(.1) rotate(-40deg);}
        to  {opacity:1; transform:scale(1) rotate(0);}
    }
    .rs-hero-label { font-size:28px; font-weight:900; margin-bottom:6px; letter-spacing:-.5px; }
    .rs-hero-sub   { font-size:14px; font-weight:500; opacity:.70; }

    /* shimmer sweep on hero */
    .rs-hero::before {
        content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
        background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);
        animation:shimmer 2.5s ease 0.8s 1 forwards;
    }
    @keyframes shimmer {
        from{left:-100%;} to{left:200%;}
    }

    /* Sub-cards */
    .rs-card {
        background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
        border-radius:var(--r-sm); padding:20px 22px;
    }
    .rs-card.choice-card   { animation:fromLeft  .45s .18s cubic-bezier(.34,1.3,.64,1) both; }
    .rs-card.impact-card   { animation:fromRight .45s .26s cubic-bezier(.34,1.3,.64,1) both; }
    .rs-card.analysis-card { animation:fadeUp    .45s .34s ease both; border-left:3px solid transparent; }
    @keyframes fromLeft  { from{opacity:0;transform:translateX(-22px);}to{opacity:1;transform:translateX(0);} }
    @keyframes fromRight { from{opacity:0;transform:translateX(22px);}to{opacity:1;transform:translateX(0);} }

    .rs-label {
        font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px;
        color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:6px;
    }
    .choice-quote {
        font-size:15px; font-style:italic; line-height:1.65;
        color:rgba(241,245,249,.90);
        border-left:2px solid rgba(255,255,255,.18); padding-left:14px; margin:0;
    }

    /* Patrimony change */
    .patr-row {
        display:flex; align-items:center; gap:10px; flex-wrap:wrap;
        margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,.07);
    }
    .patr-label { font-size:12px; font-weight:600; color:var(--muted); margin-right:4px; }
    .patr-before{ font-size:18px; font-weight:700; color:rgba(241,245,249,.45); text-decoration:line-through; }
    .patr-arrow { font-size:20px; color:var(--muted); animation:arrowPop .4s .55s both;
                  display:inline-block; }
    @keyframes arrowPop {
        from{opacity:0; transform:scale(0);} to{opacity:1; transform:scale(1);}
    }
    .patr-after { font-size:24px; font-weight:900; animation:afterCount .5s .6s both; }
    @keyframes afterCount {
        from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}
    }
    .patr-delta {
        font-size:14px; font-weight:800; padding:4px 12px; border-radius:99px;
        animation:deltaPop .45s .75s cubic-bezier(.34,1.8,.64,1) both;
    }
    @keyframes deltaPop {
        from{opacity:0; transform:scale(0);} to{opacity:1; transform:scale(1);}
    }

    .analysis-text { font-size:15px; line-height:1.72; color:rgba(241,245,249,.88); }

    /* ── END GAME ── */
    .endgame { text-align:center; padding:24px 0;
               animation:fadeUp .6s cubic-bezier(.34,1.2,.64,1) forwards; }
    .end-emoji { font-size:80px; line-height:1; display:block; margin-bottom:18px;
                 animation:emojiPop .7s cubic-bezier(.34,1.8,.64,1) .2s both; }
    @keyframes emojiPop {
        from{opacity:0; transform:scale(.3) rotate(-20deg);} to{opacity:1; transform:scale(1) rotate(0);}
    }
    .end-title     { font-size:28px; font-weight:900; margin-bottom:8px; }
    .end-score     { font-size:42px; font-weight:900; margin-bottom:6px; letter-spacing:-1px; }
    .end-breakdown { font-size:13px; color:var(--muted); margin-bottom:22px; }
    .bar-breakdown { display:flex; height:10px; border-radius:99px; overflow:hidden;
                     max-width:500px; margin:0 auto 26px; gap:3px; }
    .bb-cash  { background:var(--decent); border-radius:99px; }
    .bb-asset { background:var(--good);   border-radius:99px; }
    .bb-liab  { background:var(--bad);    border-radius:99px; }
    .end-msg   { font-size:16px; line-height:1.7; color:rgba(241,245,249,.78);
                 max-width:520px; margin:0 auto 26px; }
    .end-quote { font-style:italic; font-size:14px; color:var(--muted);
                 max-width:480px; margin:0 auto 30px; padding:16px 22px;
                 border:1px solid rgba(255,255,255,.08); border-radius:var(--r-sm); }
    .btn-replay {
        display:inline-flex; align-items:center; gap:8px;
        background:var(--glass); border:1px solid var(--glass-b);
        color:white; padding:14px 34px; border-radius:var(--r-sm);
        font-family:inherit; font-size:16px; font-weight:700; cursor:pointer;
        transition:background .2s,transform .15s;
    }
    .btn-replay:hover { background:rgba(255,255,255,.10); transform:translateY(-2px); }

    /* ── RESPONSIVE ── */
    @media(max-width:640px){
        .options-grid{grid-template-columns:1fr;}
        .stats-row{grid-template-columns:repeat(2,1fr);}
        .dots-row{gap:5px;} .dot{width:27px;height:27px;font-size:11px;}
        .end-score{font-size:30px;} #game-container{padding:18px;}
        .brand-title{font-size:17px;} .rs-hero{padding:26px 18px;}
        .rs-hero-icon{font-size:56px;} .rs-hero-label{font-size:22px;}
    }
    </style>
</head>
<body>

<div class="bg">
    <div class="orb o1"></div><div class="orb o2"></div>
    <div class="orb o3"></div><div class="orb o4"></div>
</div>
<canvas id="fx"></canvas>

<div class="page">
    <!-- HEADER -->
    <header class="glass header">
        <div class="brand">
            <span class="brand-icon">💸</span>
            <span class="brand-title">Misión Patrimonio</span>
            <span class="brand-sub">El Salón</span>
        </div>
        <div class="stats-row">
            <div class="stat-pill" id="pill-cash">
                <div class="stat-label">Efectivo</div>
                <div class="stat-val">$<span id="ui-cash">2,000</span></div>
            </div>
            <div class="stat-pill" id="pill-assets">
                <div class="stat-label">Activos</div>
                <div class="stat-val">$<span id="ui-assets">0</span></div>
            </div>
            <div class="stat-pill" id="pill-liab">
                <div class="stat-label">Pasivos</div>
                <div class="stat-val neg">$<span id="ui-liab">0</span></div>
            </div>
            <div class="stat-pill patrimony" id="pill-patr">
                <div class="stat-label">Patrimonio</div>
                <div class="stat-val">$<span id="ui-patr">2,000</span></div>
            </div>
        </div>
    </header>

    <!-- PROGRESS -->
    <div class="progress-section">
        <div class="progress-meta">
            <span id="stage-label">Etapa 1 de 7</span>
            <span id="stage-name">¿Qué es el dinero?</span>
        </div>
        <div class="dots-row" id="dots-row"></div>
        <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
    </div>

    <!-- GAME -->
    <div class="glass" id="game-container"></div>
</div>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let cash = 2000, assets = 0, liabilities = 0;
let stageIndex   = 0;
let view         = 'question'; // 'question' | 'result'
let lastSel      = null;       // { option, beforeCash, beforeAssets, beforeLibs }
const TOTAL = 7;

// Quality config — includes visual identity for the result screen
const Q = {
    good: {
        color:'#4ade80', bg:'rgba(74,222,128,.10)', border:'rgba(74,222,128,.50)',
        heroBg:'linear-gradient(135deg,rgba(74,222,128,.22) 0%,rgba(74,222,128,.06) 100%)',
        heroBorder:'rgba(74,222,128,.40)',
        icon:'🏆', label:'¡Excelente Decisión!', sub:'Tomaste la mejor opción disponible'
    },
    decent: {
        color:'#60a5fa', bg:'rgba(96,165,250,.10)', border:'rgba(96,165,250,.50)',
        heroBg:'linear-gradient(135deg,rgba(96,165,250,.22) 0%,rgba(96,165,250,.06) 100%)',
        heroBorder:'rgba(96,165,250,.40)',
        icon:'👍', label:'Decisión Acertada', sub:'Buena elección, aunque existe una mejor'
    },
    risky: {
        color:'#fbbf24', bg:'rgba(251,191,36,.10)', border:'rgba(251,191,36,.50)',
        heroBg:'linear-gradient(135deg,rgba(251,191,36,.18) 0%,rgba(251,191,36,.05) 100%)',
        heroBorder:'rgba(251,191,36,.40)',
        icon:'⚠️', label:'Decisión Arriesgada', sub:'Entendible, pero había opciones mejores'
    },
    bad: {
        color:'#f87171', bg:'rgba(248,113,113,.10)', border:'rgba(248,113,113,.50)',
        heroBg:'linear-gradient(135deg,rgba(248,113,113,.20) 0%,rgba(248,113,113,.05) 100%)',
        heroBorder:'rgba(248,113,113,.40)',
        icon:'💸', label:'Decisión Costosa', sub:'Esta elección daña el patrimonio'
    },
};

// ══════════════════════════════════════════
//  STAGES DATA
// ══════════════════════════════════════════
const stages = [
    {
        shortTitle:'¿Qué es el dinero?',
        title:'Etapa 1: ¿Qué es el Dinero?',
        theory:`El dinero cumple tres funciones: sirve para <strong>pagar cosas</strong> (medio de cambio), para <strong>medir cuánto valen</strong> las cosas (unidad de medida) y para <strong>guardar valor</strong> para el futuro (reserva de valor). Pero tiene un enemigo silencioso: la inflación. Cuando los precios suben rápido, cada día que los billetes pasan parados en un cajón compran menos cosas. En Venezuela este fenómeno es especialmente intenso, así que lo que se decide hacer con el dinero hoy tiene un impacto enorme en el mañana.`,
        scenario:`El salón organizó una rifa y ganaron $1.000. Los precios están subiendo semana a semana. Tienen que decidir ahora mismo qué hacen con ese dinero. ¿Cuál es su movida?`,

//  UTILITIES
// ══════════════════════════════════════════
let prevCash = 2000, prevAssets = 0, prevLibs = 0;

function animateVal(el, from, to, ms=500) {
    if (!el || from === to) return;
    const t0 = performance.now();
    const tick = now => {
        const p  = Math.min((now-t0)/ms, 1);
        const ep = 1 - Math.pow(1-p, 3);
        el.innerText = Math.round(from + (to-from)*ep).toLocaleString();
        if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
}

function showDelta(pillId, delta) {
    if (delta===0) return;
    const pill = document.getElementById(pillId);
    const rect = pill.getBoundingClientRect();
    const div  = document.createElement('div');
    div.className = 'delta-float';
    div.style.cssText = `left:${rect.left+rect.width/2}px;top:${rect.top-4}px;color:${delta>0?'#4ade80':'#f87171'};`;
    div.textContent = (delta>=0?'+':'')+delta.toLocaleString();
    document.body.appendChild(div);
    setTimeout(()=>div.remove(), 950);
}

function updateUI(impact) {
    const nC=cash, nA=assets, nL=liabilities;
    const nP=cash+assets-liabilities, oP=prevCash+prevAssets-prevLibs;
    animateVal(document.getElementById('ui-cash'),   prevCash,   nC);
    animateVal(document.getElementById('ui-assets'), prevAssets, nA);
    animateVal(document.getElementById('ui-liab'),   prevLibs,   nL);
    animateVal(document.getElementById('ui-patr'),   oP,         nP);
    if (impact) {
        if(impact.cash!==0)   showDelta('pill-cash',   impact.cash);
        if(impact.assets!==0) showDelta('pill-assets', impact.assets);
        if(impact.liab!==0)   showDelta('pill-liab',  -impact.liab);
        const dp=impact.cash+impact.assets-impact.liab;
        if(dp!==0) showDelta('pill-patr', dp);
        ['pill-cash','pill-assets','pill-liab','pill-patr'].forEach(id=>{
            const p=document.getElementById(id);
            p.classList.remove('flash'); void p.offsetWidth;
            p.classList.add('flash');
            setTimeout(()=>p.classList.remove('flash'),700);
        });
    }
    document.getElementById('pill-patr').style.borderColor =
        nP>=oP ? 'rgba(74,222,128,.40)' : 'rgba(248,113,113,.40)';
    prevCash=nC; prevAssets=nA; prevLibs=nL;
}

function updateProgress() {
    const pct=(stageIndex/TOTAL)*100;
    document.getElementById('bar-fill').style.width = pct+'%';
    document.getElementById('stage-label').innerText = `Etapa ${stageIndex+1} de ${TOTAL}`;
    document.getElementById('stage-name').innerText  = stages[stageIndex]?.shortTitle||'';
    const row=document.getElementById('dots-row'); row.innerHTML='';
    for(let i=0;i<TOTAL;i++){
        const d=document.createElement('div');
        d.className='dot'+(i<stageIndex?' done':i===stageIndex?' current':'');
        d.textContent=i<stageIndex?'✓':i+1;
        row.appendChild(d);
    }
}

function addTiltEffect() {
    document.querySelectorAll('.option-btn').forEach(btn=>{
        btn.addEventListener('mousemove',e=>{
            if(btn.disabled)return;
            const r=btn.getBoundingClientRect();
            const x=(e.clientX-r.left)/r.width-.5;
            const y=(e.clientY-r.top)/r.height-.5;
            btn.style.transform=`perspective(800px) rotateX(${-y*7}deg) rotateY(${x*7}deg) translateY(-3px)`;
        });
        btn.addEventListener('mouseleave',()=>{ if(!btn.disabled)btn.style.transform=''; });
    });
}

function launchConfetti() {
    const canvas=document.getElementById('fx');
    canvas.style.display='block';
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    const ctx=canvas.getContext('2d');
    const cols=['#4ade80','#818cf8','#fbbf24','#60a5fa','#f472b6','#34d399','#a78bfa'];
    const ps=Array.from({length:140},()=>({
        x:Math.random()*canvas.width, y:-15,
        vx:(Math.random()-.5)*5, vy:Math.random()*5+2,
        size:Math.random()*10+4, rot:Math.random()*360,
        vr:(Math.random()-.5)*14,
        color:cols[Math.floor(Math.random()*cols.length)],
        shape:Math.random()>.4?'rect':'circle'
    }));
    let frame=0;
    const draw=()=>{
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ps.forEach(p=>{
            p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=.05;
            ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
            ctx.fillStyle=p.color; ctx.globalAlpha=Math.max(0,1-frame/110);
            if(p.shape==='rect') ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.55);
            else{ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
            ctx.restore();
        });
        if(++frame<130) requestAnimationFrame(draw);
        else{ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none';}
    };
    draw();
}

function transition(callback) {
    const gc=document.getElementById('game-container');
    gc.classList.add('exit');
    setTimeout(()=>{
        gc.classList.remove('exit');
        callback();
        gc.classList.add('enter');
        setTimeout(()=>gc.classList.remove('enter'),420);
    },270);
}

function renderStage() {
    if(stageIndex>=stages.length){renderEndGame();return;}
    view='question'; lastSel=null;
    updateProgress();
    const stage=stages[stageIndex];
    const letters=['A','B','C','D'];
    const optsHTML=stage.options.map((opt,i)=>`
        <button class="option-btn" onclick="selectOption(${i})">
            <span class="badge">${letters[i]}</span>
            <span>${opt.text}</span>
        </button>`).join('');

    document.getElementById('game-container').innerHTML=`
        <div class="theory-box">
            <h3>📚 ${stage.title}</h3>
            <p>${stage.theory}</p>
        </div>
        <div class="scenario-box">
            <span class="scenario-label">🤔 El dilema</span>
            ${stage.scenario}
        </div>
        <div class="options-label">¿Qué decide el salón?</div>
        <div class="options-grid" id="opts">${optsHTML}</div>
        <button id="btn-next" class="btn-next" onclick="nextStage()" style="display:none;">
            Ver resultado 🔍
        </button>
    `;
    addTiltEffect();
}

window.selectOption = function(idx) {
    const option = stages[stageIndex].options[idx];
    const q = Q[option.quality];

    // Save "before" state
    lastSel = {
        option, idx,
        beforeCash:   prevCash,
        beforeAssets: prevAssets,
        beforeLibs:   prevLibs,
    };

    // Apply impact & animate stats
    cash        += option.impact.cash;
    assets      += option.impact.assets;
    liabilities += option.impact.liab;
    updateUI(option.impact);

    // Disable buttons + dim non-selected
    document.querySelectorAll('.option-btn').forEach((btn,i)=>{
        btn.disabled=true;
        if(i!==idx){ btn.classList.add('dimmed'); btn.style.transform=''; }
    });

    // Highlight selected button
    const sel=document.querySelectorAll('.option-btn')[idx];
    sel.style.cssText+=`border-color:${q.color};border-width:2px;
        background:${q.bg};box-shadow:0 0 26px ${q.border};`;
    sel.querySelector('.badge').style.cssText=`background:${q.color};color:#000;`;

    // Quick hint animation
    if(option.quality==='good')     sel.classList.add('pulse-good');
    else if(option.quality==='bad') sel.classList.add('shake');

    // Show "Ver resultado" button
    const btn=document.getElementById('btn-next');
    btn.style.display='block';
};

// ══════════════════════════════════════════
//  RENDER: RESULT SCREEN
// ══════════════════════════════════════════
function renderResult() {
    view='result';
    const { option, beforeCash, beforeAssets, beforeLibs } = lastSel;
    const q          = Q[option.quality];
    const beforePatr = beforeCash + beforeAssets - beforeLibs;
    const afterPatr  = cash + assets - liabilities;
    const deltaPatr  = afterPatr - beforePatr;
    const fmt = n => (n>=0?'+':'')+n.toLocaleString();

    // Impact chips
    let chips='';
    if(option.impact.cash!==0)
        chips+=`<span class="chip" style="color:${option.impact.cash>0?'#4ade80':'#f87171'}">💵 Efectivo ${fmt(option.impact.cash)}</span>`;
    if(option.impact.assets!==0)
        chips+=`<span class="chip" style="color:${option.impact.assets>0?'#4ade80':'#f87171'}">🏗️ Activos ${fmt(option.impact.assets)}</span>`;
    if(option.impact.liab!==0)
        chips+=`<span class="chip" style="color:#f87171">📋 Pasivos +${option.impact.liab.toLocaleString()}</span>`;
    if(!chips)
        chips=`<span class="chip">Sin cambio inmediato en el balance</span>`;

    const isLast = stageIndex === TOTAL-1;

    document.getElementById('game-container').innerHTML=`
        <div class="result-screen">

            <!-- ① QUALITY HERO -->
            <div class="rs-hero" style="background:${q.heroBg};border-color:${q.heroBorder};">
                <span class="rs-hero-icon">${q.icon}</span>
                <div class="rs-hero-label" style="color:${q.color};">${q.label}</div>
                <div class="rs-hero-sub">${q.sub}</div>
            </div>

            <!-- ② CHOICE RECAP -->
            <div class="rs-card choice-card">
                <div class="rs-label">📝 Tu respuesta</div>
                <blockquote class="choice-quote">${option.text}</blockquote>
            </div>

            <!-- ③ IMPACT -->
            <div class="rs-card impact-card">
                <div class="rs-label">📊 Impacto en el balance</div>
                <div class="chips-row">${chips}</div>
                <div class="patr-row">
                    <span class="patr-label">Patrimonio</span>
                    <span class="patr-before">$${beforePatr.toLocaleString()}</span>
                    <span class="patr-arrow">→</span>
                    <span class="patr-after" style="color:${q.color};" id="rs-after">$${afterPatr.toLocaleString()}</span>
                    <span class="patr-delta" style="background:${deltaPatr>=0?'rgba(74,222,128,.15)':'rgba(248,113,113,.15)'};
                        color:${deltaPatr>=0?'#4ade80':'#f87171'};
                        border:1px solid ${deltaPatr>=0?'rgba(74,222,128,.3)':'rgba(248,113,113,.3)'};"
                        id="rs-delta">${fmt(deltaPatr)}</span>
                </div>
            </div>

            <!-- ④ ANALYSIS -->
            <div class="rs-card analysis-card" style="border-left-color:${q.color};">
                <div class="rs-label">💡 Análisis</div>
                <p class="analysis-text">${option.feedback}</p>
            </div>

            <!-- ⑤ NEXT BUTTON -->
            <button class="btn-next" style="display:block;" onclick="nextStage()">
                ${isLast ? 'Ver resultado final 🏁' : 'Siguiente etapa ➡️'}
            </button>
        </div>
    `;

    // Confetti for top choice
    if(option.quality==='good') launchConfetti();
}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
window.nextStage = function() {
    if(view==='question'){
        // Question → Result
        transition(renderResult);
    } else {
        // Result → Next question or End
        stageIndex++;
        if(stageIndex>=TOTAL) transition(renderEndGame);
        else transition(renderStage);
    }
    window.scrollTo({top:0,behavior:'smooth'});
};

// ══════════════════════════════════════════
//  END GAME
// ══════════════════════════════════════════
function renderEndGame() {
    const patrimony=cash+assets-liabilities;
    let emoji,title,msg,color;
    if      (patrimony>=4500){emoji='🏆';title='¡Gestores de Élite!';        color='#4ade80';msg='Tomaron las mejores decisiones en cada encrucijada. Su patrimonio creció de forma sólida y resistió la inflación. Eso es planificación financiera real.';}
    else if (patrimony>=3000){emoji='👏';title='¡Buen Trabajo!';              color='#60a5fa';msg='Cometieron algunos errores, pero supieron recuperarse. El patrimonio creció por encima del punto de partida. Con más práctica serán excelentes planificadores.';}
    else if (patrimony>=1500){emoji='⚠️';title='Sobrevivieron, pero justos.'; color='#fbbf24';msg='Se descapitalizaron en el camino. Revisen las decisiones donde el patrimonio cayó más: ahí está la lección más valiosa del juego.';}
    else if (patrimony>0)    {emoji='😬';title='Por los pelos...';            color='#fb923c';msg='Quedaron con patrimonio positivo, pero apenas. Varias decisiones afectaron seriamente el capital. ¿Cuáles cambiarían si jugaran de nuevo?';}
    else                     {emoji='💀';title='Bancarrota';                  color='#f87171';msg='Los pasivos superaron a los activos. Pero recuerden: el objetivo del juego es aprender de los errores ANTES de que ocurran en la vida real. ¿Qué cambiarían?';}

    const tot=Math.max(cash+assets+liabilities,1);
    const cp=Math.max(cash/tot*100,0), ap=Math.max(assets/tot*100,0), lp=Math.max(liabilities/tot*100,0);

    document.getElementById('bar-fill').style.width='100%';
    document.getElementById('stage-label').innerText='¡Completado! 🎓';
    document.getElementById('stage-name').innerText='';
    document.querySelectorAll('.dot').forEach(d=>{d.className='dot done';d.textContent='✓';});

    document.getElementById('game-container').innerHTML=`
        <div class="endgame">
            <span class="end-emoji">${emoji}</span>
            <h2 class="end-title" style="color:${color};">${title}</h2>
            <div class="end-score" style="color:${color};">$${patrimony.toLocaleString()}</div>
            <div class="end-breakdown">
                Efectivo $${cash.toLocaleString()} + Activos $${assets.toLocaleString()} – Pasivos $${liabilities.toLocaleString()}
            </div>
            <div class="bar-breakdown">
                ${cp>0?`<div class="bb-cash"  style="flex:${cp.toFixed(1)}"></div>`:''}
                ${ap>0?`<div class="bb-asset" style="flex:${ap.toFixed(1)}"></div>`:''}
                ${lp>0?`<div class="bb-liab"  style="flex:${lp.toFixed(1)}"></div>`:''}
            </div>
            <p class="end-msg">${msg}</p>
            <div class="end-quote">
                "El objetivo de las finanzas personales no es acumular dinero por acumular.
                Es usar el dinero como herramienta para alcanzar el proyecto de vida que elegiste."
            </div>
            <button class="btn-replay" onclick="location.reload()">🔄 Jugar otra vez</button>
        </div>
    `;
    if(patrimony>=4500) launchConfetti();
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
updateUI(null);
updateProgress();
renderStage();
</script>
</body>
</html>
